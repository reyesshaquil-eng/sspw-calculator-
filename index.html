<script>
// ─── State ────────────────────────────────────────────────────────────────────

  klant: { naam:'', type:'particulier', email:'', telefoon:'', adres:'', plaats:'', omschrijving:'' },

  werkzaamheden: [],
  extra: { voorrijkosten:0, afval:0, materieel:0, onderaannemer:0, parkeer:0, spoed:0, overige:0, overigeNaam:'' },
  offerteNr: '',
  datum: '',
}

function setState(partial) {
  Object.assign(state, partial)
  render()
}

  state.project = { type:'renovatie', startdatum:'2024-09-01', urgentie:'normaal', locatie:'Utrecht', moeilijkheid:'normaal' }
  state.werkzaamheden = [
    { id:'1', naam:'Sloopwerk bestaande wand', omschrijving:'Verwijderen niet-dragende binnenwand incl. afvoer puin',
      aantal:12, eenheid:'m²', matPrijs:5, uren:8, tarief:CONFIG.uurtarief, marge:CONFIG.marge, risico:CONFIG.risico, btw:21 },
    { id:'2', naam:'Nieuwe binnenwand plaatsen', omschrijving:'Metaalstud wand met gipsplaten, incl. afwerking',
      aantal:12, eenheid:'m²', matPrijs:45, uren:16, tarief:CONFIG.uurtarief, marge:CONFIG.marge, risico:CONFIG.risico, btw:21 },
    { id:'3', naam:'Schilderwerk wanden', omschrijving:'2x schilderen, incl. grondlaag en afwerking',
      aantal:40, eenheid:'m²', matPrijs:8, uren:12, tarief:CONFIG.uurtarief, marge:CONFIG.marge, risico:CONFIG.risico, btw:21 },
  ]
  state.extra = { voorrijkosten:75, afval:150, materieel:0, onderaannemer:0, parkeer:25, spoed:0, overige:0, overigeNaam:'' }
  state.step = 1
  state.screen = 'calculator'
  render()
}

// ─── Calc helpers ─────────────────────────────────────────────────────────────
function calcItem(w) {
  const mat = w.aantal * w.matPrijs
  const arb = w.uren * w.tarief
  const basis = mat + arb
  const risico = basis * (w.risico / 100)
  const marge = basis * (w.marge / 100)
  const exclBtw = basis + risico + marge
  const btw = exclBtw * (w.btw / 100)
  return { mat, arb, basis, risico, marge, exclBtw, btw, inclBtw: exclBtw + btw }
}

function calcTotals() {
  const ws = state.werkzaamheden
  const ex = state.extra
  const totMat = ws.reduce((s,w) => s + w.aantal * w.matPrijs, 0)
  const totArb = ws.reduce((s,w) => s + w.uren * w.tarief, 0)
  const totRisico = ws.reduce((s,w) => {
    const b = w.aantal*w.matPrijs + w.uren*w.tarief; return s + b*(w.risico/100)
  }, 0)
  const totMarge = ws.reduce((s,w) => {
    const b = w.aantal*w.matPrijs + w.uren*w.tarief; return s + b*(w.marge/100)
  }, 0)
  const totBtw = ws.reduce((s,w) => {
    const b = w.aantal*w.matPrijs + w.uren*w.tarief
    const r = b*(w.risico/100), m = b*(w.marge/100)
    return s + (b+r+m)*(w.btw/100)
  }, 0)
  const extraSum = ex.voorrijkosten+ex.afval+ex.materieel+ex.onderaannemer+ex.parkeer+ex.spoed+ex.overige
  const extraBtw = extraSum * 0.21
  const subtotaal = totMat + totArb + totRisico + totMarge + extraSum
  const btw = totBtw + extraBtw
  return { totMat, totArb, totRisico, totMarge, extraSum, subtotaal, btw, totaal: subtotaal + btw }
}

// ─── Format helpers ───────────────────────────────────────────────────────────
const eur = n => new Intl.NumberFormat('nl-NL', { style:'currency', currency:'EUR' }).format(n)
const datum = d => d ? new Date(d).toLocaleDateString('nl-NL', { day:'numeric', month:'long', year:'numeric' }) : ''
const newId = () => Date.now().toString()
function offerteNr() {
  if (!state.offerteNr) state.offerteNr = `OFF-${new Date().getFullYear()}-${Math.floor(Math.random()*900)+100}`
  return state.offerteNr
}

const projectLabels = {
  renovatie:'Renovatie', aanbouw:'Aanbouw', dakwerk:'Dakwerk',
  timmerwerk:'Timmerwerk', badkamer_toilet:'Badkamer / Toilet', algemene_klus:'Algemene klus'
}

// ─── Render ───────────────────────────────────────────────────────────────────
function render() {
  document.getElementById('app').innerHTML = buildApp()
  attachEvents()
}

function buildApp() {
  if (state.screen === 'home') return buildHome()
  if (state.screen === 'calculator') return buildCalculator()
  if (state.screen === 'quote') return buildFullQuote()
  if (state.screen === 'lead') return buildLead()
  return ''
}

// ─── HOME ─────────────────────────────────────────────────────────────────────

// ─── CALCULATOR ───────────────────────────────────────────────────────────────
function newQuote() {
  state.klant = { naam:'', type:'particulier', email:'', telefoon:'', adres:'', plaats:'', omschrijving:'' }
  state.project = { type:'renovatie', startdatum:'', urgentie:'normaal', locatie:'', moeilijkheid:'normaal' }
  state.werkzaamheden = []
  state.extra = { voorrijkosten:0, afval:0, materieel:0, onderaannemer:0, parkeer:0, spoed:0, overige:0, overigeNaam:'' }
  state.step = 1
  state.offerteNr = ''
  state.screen = 'calculator'
  render()
}

function buildCalculator() {
  const pct = Math.round((state.step / 5) * 100)
  const titles = ['Klantgegevens','Projectgegevens','Werkzaamheden','Extra kosten','Samenvatting']

  const canNext = () => {
    if (state.step === 1) return state.klant.naam.trim().length > 0
    if (state.step === 3) return state.werkzaamheden.length > 0
    return true
  }

  const prevBtn = state.step > 1
    ? `<button onclick="setState({step:${state.step-1}})" class="px-5 py-2.5 rounded-xl border border-gray-300 text-gray-700 font-medium hover:bg-gray-50 transition">← Vorige</button>`
    : `<button disabled class="px-5 py-2.5 rounded-xl border border-gray-200 text-gray-300 font-medium cursor-not-allowed">← Vorige</button>`

  let nextBtn = ''
  if (state.step < 5) {
    const dis = !canNext()
    nextBtn = `<button onclick="nextStep()" ${dis?'disabled':''} class="px-6 py-2.5 rounded-xl bg-blue-600 text-white font-medium hover:bg-blue-700 transition ${dis?'opacity-40 cursor-not-allowed':''}">
      ${state.step === 4 ? 'Bekijk samenvatting →' : 'Volgende stap →'}</button>`
  }

  return `
  <div class="max-w-3xl mx-auto fade-in">
    <!-- Back to home -->
    <button onclick="setState({screen:'home'})" class="mb-6 flex items-center gap-2 text-gray-400 hover:text-gray-600 transition text-sm no-print">
      ← Terug naar home
    </button>

    <!-- Progress -->
    <div class="mb-8">
      <div class="flex items-center justify-between mb-2">
        <span class="text-sm font-medium text-gray-500">Stap ${state.step} van 5 — ${titles[state.step-1]}</span>
        <span class="text-sm text-gray-400">${pct}% voltooid</span>
      </div>
      <div class="h-2 bg-gray-200 rounded-full">
        <div class="h-2 bg-blue-600 rounded-full transition-all duration-300" style="width:${pct}%"></div>
      </div>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
      <h2 class="text-xl font-semibold text-gray-900 mb-6">Stap ${state.step} — ${titles[state.step-1]}</h2>
      ${buildStep(state.step)}

      <!-- Nav buttons -->
      <div class="flex items-center justify-between mt-8 pt-6 border-t border-gray-100">
        ${prevBtn}
        ${nextBtn}
      </div>
    </div>
  </div>`
}

function buildStep(s) {
  if (s === 1) return buildKlantForm()
  if (s === 2) return buildProjectForm()
  if (s === 3) return buildWerkForm()
  if (s === 4) return buildExtraForm()
  if (s === 5) return buildSamenvatting()
  return ''
}

// ─── STEP 1: Klant ────────────────────────────────────────────────────────────
function buildKlantForm() {
  const k = state.klant
  const inp = 'w-full rounded-xl border border-gray-200 px-4 py-3 text-sm focus:ring-2 focus:ring-blue-500 border-transparent'
  const lbl = 'block text-sm font-medium text-gray-700 mb-1.5'
  const typeBtn = (v, label) => `
    <button onclick="setKlant('type','${v}')" class="flex-1 py-3 rounded-xl border-2 text-sm font-medium transition
      ${k.type===v ? 'border-blue-600 bg-blue-50 text-blue-700' : 'border-gray-200 text-gray-600 hover:border-gray-300'}">
      ${label}
    </button>`

  return `
  <div class="space-y-5">
    <div>
      <p class="${lbl}">Type klant</p>
      <div class="flex gap-3">
        ${typeBtn('particulier','🏠 Particulier')}
        ${typeBtn('bedrijf','🏢 Bedrijf')}
      </div>
    </div>
    <div>
      <label class="${lbl}">${k.type==='bedrijf'?'Contactpersoon':'Naam'}</label>
      <input class="${inp}" placeholder="Naam klant" value="${k.naam}" oninput="setKlant('naam',this.value)" />
    </div>
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="${lbl}">E-mailadres</label>
        <input class="${inp}" type="email" placeholder="email@voorbeeld.nl" value="${k.email}" oninput="setKlant('email',this.value)" />
      </div>
      <div>
        <label class="${lbl}">Telefoonnummer</label>
        <input class="${inp}" placeholder="06-12345678" value="${k.telefoon}" oninput="setKlant('telefoon',this.value)" />
      </div>
    </div>
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="${lbl}">Adres</label>
        <input class="${inp}" placeholder="Straat en huisnummer" value="${k.adres}" oninput="setKlant('adres',this.value)" />
      </div>
      <div>
        <label class="${lbl}">Plaats</label>
        <input class="${inp}" placeholder="Woonplaats" value="${k.plaats}" oninput="setKlant('plaats',this.value)" />
      </div>
    </div>
    <div>
      <label class="${lbl}">Korte projectomschrijving</label>
      <textarea class="${inp} resize-none" rows="3" placeholder="Beschrijf kort wat de klant wil laten doen..."
        oninput="setKlant('omschrijving',this.value)">${k.omschrijving}</textarea>
    </div>
  </div>`
}

// ─── STEP 2: Project ──────────────────────────────────────────────────────────
function buildProjectForm() {
  const p = state.project
  const inp = 'w-full rounded-xl border border-gray-200 px-4 py-3 text-sm'
  const lbl = 'block text-sm font-medium text-gray-700 mb-1.5'
  
  const types = [
    ['renovatie','🔨','Renovatie'], ['aanbouw','🏗️','Aanbouw'],
    ['dakwerk','🏠','Dakwerk'], ['timmerwerk','🪚','Timmerwerk'],
    ['badkamer_toilet','🚿','Badkamer/Toilet'], ['algemene_klus','🔧','Alg. klus']

  const urgencies = [['flexibel','😌 Flexibel'],['normaal','📅 Normaal'],['spoed','⚡ Spoed']]
  const moeilijkheden = [['normaal','⭐ Normaal'],['complex','⭐⭐ Complex'],['zeer_complex','⭐⭐⭐ Zeer complex']]

  return `
  <div class="space-y-6">
    <div>

        ${types.map(([v,ic,label]) => `
          <button onclick="setProject('type','${v}')" class="py-3 px-3 rounded-xl border-2 text-sm font-medium text-center transition
            ${p.type===v ? 'border-blue-600 bg-blue-50 text-blue-700' : 'border-gray-200 text-gray-600 hover:border-gray-300'}">
            <div class="text-xl mb-1">${ic}</div>${label}
          </button>`).join('')}
      </div>
    </div>
    <div class="grid grid-cols-2 gap-4">

        <label class="${lbl}">Gewenste startdatum</label>
        <input class="${inp}" type="date" value="${p.startdatum}" onchange="setProject('startdatum',this.value)" />
      </div>
      <div>
        <label class="${lbl}">Locatie / Stad</label>
        <input class="${inp}" placeholder="bijv. Amsterdam" value="${p.locatie}" oninput="setProject('locatie',this.value)" />
      </div>
    </div>
    <div>
      <p class="${lbl}">Urgentie</p>
      <div class="flex gap-3">
        ${urgencies.map(([v,label]) => `
          <button onclick="setProject('urgentie','${v}')" class="flex-1 py-2.5 rounded-xl border-2 text-sm font-medium transition
            ${p.urgentie===v ? 'border-blue-600 bg-blue-50 text-blue-700' : 'border-gray-200 text-gray-600 hover:border-gray-300'}">
            ${label}

      </div>
    </div>
    <div>
      <p class="${lbl}">Moeilijkheidsgraad</p>
      <div class="flex gap-3">
        ${moeilijkheden.map(([v,label]) => `
          <button onclick="setProject('moeilijkheid','${v}')" class="flex-1 py-2.5 rounded-xl border-2 text-sm font-medium transition
            ${p.moeilijkheid===v ? 'border-blue-600 bg-blue-50 text-blue-700' : 'border-gray-200 text-gray-600 hover:border-gray-300'}">
            ${label}
          </button>`).join('')}
      </div>
    </div>
  </div>`
}

// ─── STEP 3: Werkzaamheden ────────────────────────────────────────────────────
function buildWerkForm() {
  const ws = state.werkzaamheden
  const totaal = ws.reduce((s,w) => s + calcItem(w).inclBtw, 0)
  const inp = 'w-full rounded-lg border border-gray-200 px-3 py-2 text-sm'
  const lbl = 'block text-xs font-medium text-gray-600 mb-1'

  const rows = ws.map((w, idx) => {
    const c = calcItem(w)
    const open = w._open
    return `
    <div class="border border-gray-200 rounded-xl overflow-hidden">
      <div class="flex items-center justify-between px-4 py-3 bg-gray-50 cursor-pointer select-none"
           onclick="toggleWerk('${w.id}')">
        <div class="flex items-center gap-3">
          <span class="w-6 h-6 rounded-full bg-blue-100 text-blue-700 text-xs font-bold flex items-center justify-center">${idx+1}</span>
          <span class="font-medium text-sm text-gray-800">${w.naam || 'Nieuwe werkzaamheid'}</span>
        </div>
        <div class="flex items-center gap-4">
          <span class="text-sm font-semibold text-gray-700">${eur(c.inclBtw)}</span>
          <button onclick="event.stopPropagation();removeWerk('${w.id}')" class="text-red-400 hover:text-red-600 text-lg leading-none transition">×</button>
          <span class="text-gray-400 text-sm">${open?'▲':'▼'}</span>
        </div>
      </div>
      ${open ? `
      <div class="p-5 space-y-4">
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="${lbl}">Naam werkzaamheid</label>
            <input class="${inp}" placeholder="bijv. Sloopwerk wand" value="${w.naam}"
              oninput="updateWerk('${w.id}','naam',this.value)" />
          </div>
          <div>
            <label class="${lbl}">Omschrijving</label>
            <input class="${inp}" placeholder="Korte omschrijving" value="${w.omschrijving}"
              oninput="updateWerk('${w.id}','omschrijving',this.value)" />
          </div>
        </div>
        <div class="grid grid-cols-4 gap-3">
          <div>
            <label class="${lbl}">Aantal</label>
            <input class="${inp}" type="number" min="0" step="0.5" value="${w.aantal}"
              oninput="updateWerk('${w.id}','aantal',parseFloat(this.value)||0)" />
          </div>
          <div>
            <label class="${lbl}">Eenheid</label>
            <select class="${inp}" onchange="updateWerk('${w.id}','eenheid',this.value)">
              ${['m²','m¹','stuks','uur','dag','set','lump sum'].map(u =>
                `<option ${w.eenheid===u?'selected':''}>${u}</option>`).join('')}
            </select>
          </div>
          <div>
            <label class="${lbl}">Materiaal p/e (€)</label>
            <input class="${inp}" type="number" min="0" step="0.50" value="${w.matPrijs}"
              oninput="updateWerk('${w.id}','matPrijs',parseFloat(this.value)||0)" />
          </div>
          <div>
            <label class="${lbl}">Arbeidsuren</label>
            <input class="${inp}" type="number" min="0" step="0.5" value="${w.uren}"
              oninput="updateWerk('${w.id}','uren',parseFloat(this.value)||0)" />
          </div>
        </div>
        <div class="grid grid-cols-4 gap-3">
          <div>
            <label class="${lbl}">Uurtarief (€)</label>
            <input class="${inp}" type="number" min="0" value="${w.tarief}"
              oninput="updateWerk('${w.id}','tarief',parseFloat(this.value)||0)" />
          </div>
          <div>
            <label class="${lbl}">Marge (%)</label>
            <input class="${inp}" type="number" min="0" max="100" value="${w.marge}"
              oninput="updateWerk('${w.id}','marge',parseFloat(this.value)||0)" />
          </div>
          <div>
            <label class="${lbl}">Risico-opslag (%)</label>
            <input class="${inp}" type="number" min="0" max="100" value="${w.risico}"
              oninput="updateWerk('${w.id}','risico',parseFloat(this.value)||0)" />
          </div>
          <div>
            <label class="${lbl}">BTW (%)</label>
            <select class="${inp}" onchange="updateWerk('${w.id}','btw',parseInt(this.value))">
              <option ${w.btw===21?'selected':''}>21</option>
              <option ${w.btw===9?'selected':''}>9</option>
              <option ${w.btw===0?'selected':''}>0</option>
            </select>
          </div>
        </div>
        <div class="bg-gray-50 rounded-xl p-4 grid grid-cols-4 gap-3 text-sm">
          <div><p class="text-gray-500 text-xs">Materiaal</p><p class="font-semibold">${eur(c.mat)}</p></div>

        </div>
      </div>` : ''}
    </div>`
  }).join('')

  return `
  <div class="space-y-4">
    ${rows}

  </div>`

// ─── Event handlers ───────────────────────────────────────────────────────────
function attachEvents() {
  // Input bindings are inline oninput handlers — no extra event attachment needed
}

function setKlant(field, val) {
  state.klant[field] = val
  if (field === 'naam') {
    // Refresh next button state without full re-render
    const btn = document.querySelector('button[onclick="nextStep()"]')
    if (btn) {
      const dis = val.trim().length === 0
      btn.disabled = dis
      btn.className = btn.className.replace(dis ? '' : 'opacity-40 cursor-not-allowed', '')
      if (dis) btn.classList.add('opacity-40', 'cursor-not-allowed')
      else { btn.classList.remove('opacity-40'); btn.classList.remove('cursor-not-allowed') }
    }
  }
}
function setProject(field, val) { state.project[field] = val; render() }
function setExtra(field, val) { state.extra[field] = val; render() }

function nextStep() {
  if (state.step === 1 && !state.klant.naam.trim()) return
  if (state.step === 3 && state.werkzaamheden.length === 0) return
  state.step = Math.min(5, state.step + 1)
  render()
}

function addWerk() {
  const w = { id: newId(), naam:'', omschrijving:'', aantal:1, eenheid:'m²',
    matPrijs:0, uren:0, tarief:CONFIG.uurtarief, marge:CONFIG.marge, risico:CONFIG.risico, btw:21, _open:true }
  state.werkzaamheden.push(w)
  render()
}

function removeWerk(id) {
  state.werkzaamheden = state.werkzaamheden.filter(w => w.id !== id)
  render()
}

function toggleWerk(id) {
  const w = state.werkzaamheden.find(w => w.id === id)
  if (w) { w._open = !w._open; render() }
}

function updateWerk(id, field, val) {
  const w = state.werkzaamheden.find(w => w.id === id)
  if (w) { w[field] = val; render() }
}

  document.getElementById('app').innerHTML = `
